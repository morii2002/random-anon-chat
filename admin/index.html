<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Now - 管理画面</title>
<style>
  * { box-sizing: border-box; font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; }
  body { margin: 0; background: #f4f5f7; color: #222; }
  header { background: #4a47e0; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 1.2rem; }
  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .toolbar select, .toolbar button { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem; }
  .toolbar button { background: #4a47e0; color: white; border: none; cursor: pointer; }
  .report { background: white; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .report-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
  .report-head .meta { font-size: 0.85rem; color: #777; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
  .badge.open { background: #ffe1e1; color: #c0392b; }
  .badge.resolved { background: #e1ffe6; color: #1e8449; }
  .reason { margin: 6px 0 10px; font-size: 0.95rem; }
  .transcript { background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 10px; max-height: 220px; overflow-y: auto; font-size: 0.85rem; }
  .transcript .line { margin-bottom: 4px; }
  .transcript .reporter { color: #c0392b; }
  .transcript .partner { color: #2980b9; }
  .transcript .time { color: #aaa; font-size: 0.75rem; margin-right: 6px; }
  .actions { margin-top: 10px; display: flex; gap: 8px; }
  .actions button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; }
  .resolve-btn { background: #4a47e0; color: white; }
  .reopen-btn { background: #ddd; color: #333; }
  .empty { text-align: center; color: #999; padding: 40px 0; }
  .stats { display: flex; gap: 24px; background: white; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 0.9rem; }
  .stats .item strong { font-size: 1.1rem; color: #4a47e0; margin-right: 4px; }
  .section { background: white; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .section h2 { margin-top: 0; font-size: 1.05rem; }
  .section p.help { color: #777; font-size: 0.85rem; margin-top: -6px; }
  .aff-form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .aff-form input { flex: 1; min-width: 160px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
  .aff-form button { background: #4a47e0; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.9rem; }
  .aff-list { list-style: none; padding: 0; margin: 0; }
  .aff-item { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
  .aff-item:last-child { border-bottom: none; }
  .aff-item .info { overflow: hidden; }
  .aff-item .info .t { font-weight: bold; }
  .aff-item .info .u { color: #888; font-size: 0.8rem; word-break: break-all; }
  .aff-item .del-btn { background: #e05353; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; }
  .aff-empty { color: #999; font-size: 0.9rem; padding: 8px 0; }
  .aff-url-form { display: flex; gap: 8px; margin-bottom: 14px; }
  .aff-url-form input { flex: 1; min-width: 200px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
  .aff-url-form button { background: #4a47e0; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.9rem; }
  .aff-preview { background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 12px; margin-bottom: 14px; display: none; }
  .aff-preview.show { display: block; }
  .aff-preview-img { max-height: 150px; margin-bottom: 8px; border-radius: 6px; }
  .aff-preview-meta { font-size: 0.9rem; }
  .aff-preview-title { font-weight: bold; margin-bottom: 4px; }
  .aff-preview-desc { color: #666; font-size: 0.85rem; margin-bottom: 4px; }
  .aff-preview-url { color: #4a47e0; font-size: 0.8rem; word-break: break-all; }
</style>
</head>
<body>
  <header>
    <h1>Chat Now - 通報管理画面</h1>
  </header>
  <main>
    <div class="stats" id="stats">
      <div class="item">オンライン: <strong id="statOnline">-</strong>人</div>
      <div class="item">待機中: <strong id="statWaiting">-</strong>人</div>
      <div class="item">チャット中: <strong id="statChatting">-</strong>組</div>
    </div>
    <div class="section">
      <h2>アフィリエイトリンク管理(ユーザー画面サイドバー)</h2>
      <p class="help">URLを入力してOGP画像を自動取得。商品画像が見えるように表示されます。</p>

      <!-- OGP画像取得フォーム -->
      <div class="aff-url-form">
        <input type="url" id="affOgpUrl" placeholder="URL (https://...)" />
        <button type="button" id="affFetchOgpBtn">OGP取得</button>
      </div>

      <!-- OGP プレビュー -->
      <div class="aff-preview" id="affPreview">
        <img id="affPreviewImg" class="aff-preview-img" alt="プレビュー" />
        <div class="aff-preview-meta">
          <div class="aff-preview-title" id="affPreviewTitle"></div>
          <div class="aff-preview-desc" id="affPreviewDesc"></div>
          <div class="aff-preview-url" id="affPreviewUrl"></div>
          <button type="button" id="affAddBtn" style="margin-top: 8px; padding: 6px 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;">この画像を追加</button>
        </div>
      </div>

      <!-- 登録済みリスト -->
      <ul class="aff-list" id="affList"></ul>
    </div>

    <div class="toolbar">
      <select id="filter">
        <option value="all">すべて表示</option>
        <option value="open" selected>未対応のみ</option>
        <option value="resolved">対応済みのみ</option>
      </select>
      <button id="reloadBtn">再読み込み</button>
    </div>
    <div id="list"></div>
  </main>

  <script>
    const listEl = document.getElementById('list');
    const filterEl = document.getElementById('filter');
    const reloadBtn = document.getElementById('reloadBtn');

    function fmtTime(ts) {
      const d = new Date(ts);
      return d.toLocaleString('ja-JP');
    }

    async function loadReports() {
      listEl.innerHTML = '<div class="empty">読み込み中...</div>';
      try {
        const res = await fetch('/admin/api/reports');
        const data = await res.json();
        render(data.reports || []);
      } catch (e) {
        listEl.innerHTML = '<div class="empty">読み込みに失敗しました</div>';
      }
    }

    function render(reports) {
      const filter = filterEl.value;
      const filtered = reports.filter((r) => filter === 'all' || r.status === filter);

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty">該当する通報はありません</div>';
        return;
      }

      listEl.innerHTML = '';
      filtered.forEach((r) => {
        const div = document.createElement('div');
        div.className = 'report';

        const transcriptHtml = (r.transcript || []).map((m) => {
          const cls = m.from === '通報者' ? 'reporter' : 'partner';
          return `<div class="line"><span class="time">${fmtTime(m.time)}</span><span class="${cls}">[${m.from}]</span> ${escapeHtml(m.text)}</div>`;
        }).join('') || '<div class="line">(会話ログはありません)</div>';

        div.innerHTML = `
          <div class="report-head">
            <div class="meta">通報時刻: ${fmtTime(r.time)} / ID: ${r.id}</div>
            <span class="badge ${r.status}">${r.status === 'open' ? '未対応' : '対応済み'}</span>
          </div>
          <div class="reason"><strong>通報理由:</strong> ${escapeHtml(r.reason) || '(理由の記載なし)'}</div>
          <div class="transcript">${transcriptHtml}</div>
          <div class="actions">
            ${r.status === 'open'
              ? `<button class="resolve-btn" data-id="${r.id}" data-status="resolved">対応済みにする</button>`
              : `<button class="reopen-btn" data-id="${r.id}" data-status="open">未対応に戻す</button>`}
          </div>
        `;
        listEl.appendChild(div);
      });

      listEl.querySelectorAll('button[data-id]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const status = btn.dataset.status;
          await fetch(`/admin/api/reports/${id}/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status }),
          });
          loadReports();
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function loadStats() {
      try {
        const res = await fetch('/admin/api/stats');
        const data = await res.json();
        document.getElementById('statOnline').textContent = data.online;
        document.getElementById('statWaiting').textContent = data.waiting;
        document.getElementById('statChatting').textContent = data.chatting;
      } catch (e) {
        // ignore
      }
    }

    // ===== アフィリエイトリンク管理 (OGP画像版) =====
    const affOgpUrlEl = document.getElementById('affOgpUrl');
    const affFetchOgpBtn = document.getElementById('affFetchOgpBtn');
    const affPreview = document.getElementById('affPreview');
    const affPreviewImg = document.getElementById('affPreviewImg');
    const affPreviewTitle = document.getElementById('affPreviewTitle');
    const affPreviewDesc = document.getElementById('affPreviewDesc');
    const affPreviewUrl = document.getElementById('affPreviewUrl');
    const affAddBtn = document.getElementById('affAddBtn');
    const affListEl = document.getElementById('affList');

    let currentOgpData = null; // OGP取得後の情報を一時保存

    async function loadAffiliates() {
      try {
        const res = await fetch('/admin/api/affiliates');
        const data = await res.json();
        renderAffiliates(data.links || []);
      } catch (e) {
        affListEl.innerHTML = '<li class="aff-empty">読み込みに失敗しました</li>';
      }
    }

    function renderAffiliates(links) {
      if (links.length === 0) {
        affListEl.innerHTML = '<li class="aff-empty">登録されたリンクはありません</li>';
        return;
      }
      affListEl.innerHTML = '';
      links.forEach((l) => {
        const li = document.createElement('li');
        li.className = 'aff-item';
        const displayText = l.title || l.text || 'No title';
        li.innerHTML = `
          <div class="info">
            ${l.image ? `<img src="${escapeHtml(l.image)}" style="max-height: 40px; border-radius: 4px; margin-bottom: 4px;" />` : ''}
            <div class="t">${escapeHtml(displayText)}</div>
            <div class="u">${escapeHtml(l.url)}</div>
          </div>
          <button class="del-btn" data-id="${l.id}">削除</button>
        `;
        affListEl.appendChild(li);
      });

      affListEl.querySelectorAll('.del-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          await fetch(`/admin/api/affiliates/${btn.dataset.id}`, { method: 'DELETE' });
          loadAffiliates();
        });
      });
    }

    // OGP情報取得
    affFetchOgpBtn.addEventListener('click', async () => {
      const url = affOgpUrlEl.value.trim();
      if (!url) {
        alert('URLを入力してください');
        return;
      }

      affFetchOgpBtn.disabled = true;
      affFetchOgpBtn.textContent = '取得中...';

      try {
        const res = await fetch('/api/fetch-ogp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        if (!res.ok) {
          throw new Error('OGP取得失敗');
        }

        const data = await res.json();
        if (data.ok && data.ogp) {
          currentOgpData = { ...data.ogp, url };

          // プレビュー表示
          affPreviewImg.src = data.ogp.image || '';
          affPreviewTitle.textContent = data.ogp.title || '(タイトルなし)';
          affPreviewDesc.textContent = data.ogp.description || '(説明なし)';
          affPreviewUrl.textContent = url;
          affPreview.classList.add('show');
        } else {
          throw new Error(data.error || 'OGP情報がありません');
        }
      } catch (err) {
        alert('OGP取得に失敗: ' + err.message);
        affPreview.classList.remove('show');
      } finally {
        affFetchOgpBtn.disabled = false;
        affFetchOgpBtn.textContent = 'OGP取得';
      }
    });

    // OGP情報を登録
    affAddBtn.addEventListener('click', async () => {
      if (!currentOgpData) {
        alert('先にOGP取得を実行してください');
        return;
      }

      affAddBtn.disabled = true;
      affAddBtn.textContent = '追加中...';

      try {
        const res = await fetch('/admin/api/affiliates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: currentOgpData.title,
            image: currentOgpData.image,
            description: currentOgpData.description,
            url: currentOgpData.url,
          }),
        });

        if (res.ok) {
          affOgpUrlEl.value = '';
          affPreview.classList.remove('show');
          currentOgpData = null;
          loadAffiliates();
          alert('追加しました');
        } else {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || '追加失敗');
        }
      } catch (err) {
        alert('追加に失敗: ' + err.message);
      } finally {
        affAddBtn.disabled = false;
        affAddBtn.textContent = 'この画像を追加';
      }
    });

    filterEl.addEventListener('change', loadReports);
    reloadBtn.addEventListener('click', () => { loadReports(); loadStats(); });
    loadReports();
    loadStats();
    loadAffiliates();
    setInterval(loadStats, 5000);
  </script>
</body>
</html>
